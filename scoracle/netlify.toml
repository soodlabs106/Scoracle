[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/home-data"
  to = "/.netlify/functions/home-data"
  status = 200

[[redirects]]
  from = "/api/cache-oauth-avatar"
  to = "/.netlify/functions/cache-oauth-avatar"
  status = 200
